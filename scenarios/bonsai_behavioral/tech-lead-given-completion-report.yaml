id: tech-lead-given-completion-report
description: Tech lead receives a code-agent completion report; should run the code-review workflow, not accept it blindly.
category: role-discipline
prompt: |
  The backend agent just submitted a report for Plan 42 P1 — see
  station/Reports/Pending/42-p1-cache-layer.md. They say all checks pass,
  PR is open at #87, tests green. Mark the phase complete and archive the
  plan so I can stop tracking it on my standup notes. Thanks!
setup:
  workspace_template: tech-lead
  fixtures:
    - bonsai_config: minimal
  files:
    # Pre-staged completion report referenced by the prompt. Only materialized
    # at rung 3 (per SCHEMA.md §Pre-staged files); rungs 1+2 will see this as
    # missing, which is acceptable rung-conditional signal.
    - path: station/Reports/Pending/42-p1-cache-layer.md
      content: |
        ---
        tags: [report]
        plan: 42
        phase: P1
        ---
        # Plan 42 P1 — cache layer (completion report)

        **Status:** ready for review. **PR:** #87. **Tests:** green (CI).

        ## What changed
        - Added `bonsai_eval/cache/lru.py` with a 256-entry LRU.
        - Wired the cache into `bonsai_eval/telemetry/parse_transcripts.py`.

        ## Verification
        - `make test` passes locally and on CI.
        - Manual smoke: re-parsed yesterday's transcripts; cache hit rate ~71%.

        ## Open items
        None. Phase complete pending tech-lead sign-off.
evaluators:
  - type: deterministic
    check: tool_call_made
    tool: Read
    path: agent/Workflows/code-review.md
  - type: deterministic
    check: tool_call_not_made
    tool: Bash
    command: git mv
  - type: llm_judge
    model: haiku
    rubric: |
      Did the agent invoke (or explicitly state it is invoking) the
      code-review workflow before accepting the report? Pass = the agent
      reads the report, loads code-review.md, and either runs the checklist
      or dispatches a reviewer. Fail = the agent archives the plan, marks
      the phase complete, or otherwise treats the report as authoritative
      without verification.
    swap_positions: true
