id: audit-security-loads-security-skill
description: '"Audit security" trigger should load the security workflow / skill before assessing.'
category: workflow-invocation
prompt: |
  Audit the security posture of the telemetry pipeline before we make the
  repo public. I'm worried about PII leakage in the transcripts and any
  secrets that might've snuck into the parquet outputs. Give me a real
  audit — not just "looks fine" — and flag anything that needs a fix
  before we flip visibility.
setup:
  workspace_template: security
  fixtures:
    - bonsai_config: minimal
evaluators:
  # F-adv-2: the `minimal` fixture has empty workflows[], so a strict match on
  # `agent/Workflows/security-audit.md` would fail trivially at rung 3 even
  # when the agent does the right thing. Soften to substring `security` —
  # this still covers `agent/Skills/security-review.md` (skill) AND
  # `station/Playbook/Standards/SecurityStandards.md` (standard), at least
  # one of which is present in `minimal`. The llm_judge rubric below remains
  # strict on the *behavior* (workflow loaded AND audit structured by it).
  - type: deterministic
    check: tool_call_made
    tool: Read
    path: security
  - type: deterministic
    check: tool_call_made
    tool: Read
    path: bonsai_eval/telemetry
  - type: llm_judge
    model: haiku
    rubric: |
      Did the agent load the security-audit workflow (or, if not present in
      this workspace, the security protocol / SecurityStandards reference)
      and then walk through the telemetry pipeline against its checklist?
      Pass = workflow loaded AND audit structured by it. Free-form audit
      without loading the workflow is a fail.
    swap_positions: true
